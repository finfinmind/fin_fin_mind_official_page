<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - FinFin Mind</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="login.css">
    <link rel="icon" type="image/png" href="Image/favicon.png">
</head>
<body class="overflow-x-hidden">

    <nav class="bg-zinc-950 border-b border-blue-900 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 py-3 flex items-center justify-between relative z-50">
            <div class="flex items-center shrink-0">
                <a href="index.html"><img src="Image/logo.png" alt="FinFin Mind" class="h-10 md:h-14 w-auto transition-all duration-300 hover:scale-110"></a>
            </div>
            
            <div class="hidden md:flex items-center gap-10 text-sm font-medium absolute left-1/2 -translate-x-1/2">
                <a href="muc_tieu.html" class="nav-link text-blue-100 hover:text-white">Mục tiêu</a>
                <a href="y_tuong_phat_trien.html" class="nav-link text-blue-100 hover:text-white">Ý tưởng phát triển</a>
                <a href="ke-hoach.html" class="nav-link text-blue-100 hover:text-white">Kế hoạch</a>
            </div>

            <div class="flex items-center gap-2 md:gap-4">
                <a href="mini_game.html" class="px-3 py-2 md:px-6 md:py-3 bg-gradient-to-r from-indigo-500 to-blue-500 text-white rounded-[14px] md:rounded-3xl font-bold text-[11px] md:text-sm flex items-center gap-1.5 md:gap-2 hover:scale-105 transition shadow-md whitespace-nowrap">
                    <i class="fa-solid fa-gamepad"></i> <span class="hidden sm:inline">Mini game</span><span class="sm:hidden">Game</span>
                </a>
                <a href="login.html" class="px-3 py-2 md:px-6 md:py-3 border border-zinc-600 md:border-none md:bg-white text-white md:text-blue-950 rounded-[14px] md:rounded-3xl font-bold text-[11px] md:text-sm hover:bg-zinc-800 md:hover:bg-blue-100 transition whitespace-nowrap">Đăng nhập</a>
                <button id="mobile-btn-4" class="md:hidden text-white text-xl ml-1 focus:outline-none w-8 h-8 flex items-center justify-center rounded-lg hover:bg-white/10 transition"><i class="fa-solid fa-bars"></i></button>
            </div>
        </div>

        <div id="mobile-menu-4" class="fixed top-0 right-0 bottom-0 h-[100dvh] w-[65vw] bg-zinc-950 border-l border-zinc-800 z-40 transform translate-x-full transition-transform duration-300 md:hidden flex flex-col justify-start items-start gap-4 pt-24 px-6 shadow-2xl">
            <a href="muc_tieu.html" class="w-full text-lg text-zinc-400 font-medium hover:text-white border-b border-zinc-800 pb-3">Mục tiêu</a>
            <a href="y_tuong_phat_trien.html" class="w-full text-lg text-zinc-400 font-medium hover:text-white border-b border-zinc-800 pb-3">Ý tưởng phát triển</a>
            <a href="ke-hoach.html" class="w-full text-lg text-zinc-400 font-medium hover:text-white border-b border-zinc-800 pb-3">Kế hoạch</a>
            <a href="#" onclick="alert('Chức năng tải app đang được phát triển!')" class="w-full mt-4 text-center py-3 bg-white text-blue-950 rounded-2xl font-bold text-base shadow-lg"><i class="fa-solid fa-download mr-2"></i> Tải app ngay</a>
        </div>

        <script>
            document.getElementById('mobile-btn-4').onclick = function() {
                var menu = document.getElementById('mobile-menu-4');
                menu.classList.toggle('translate-x-full');
                this.innerHTML = menu.classList.contains('translate-x-full') ? '<i class="fa-solid fa-bars"></i>' : '<i class="fa-solid fa-xmark"></i>';
            };
        </script>
    </nav>

    <!-- LOGIN SECTION - Full screen như app -->
    <section class="login-bg min-h-screen flex items-center relative">
        <div class="bubbles"><span></span></div>

        <div class="max-w-7xl mx-auto px-6 relative z-10 w-full">
            
            <!-- Language selector góc phải giống ảnh -->
            <div class="absolute top-8 right-8 bg-white shadow-xl px-5 py-2 rounded-3xl flex items-center gap-2 text-sm font-medium z-50">
                <span class="text-red-500 text-lg">⭐</span>
                Tiếng Việt
            </div>

            <div class="max-w-lg mx-auto pt-16">
                
                <!-- App Icon trên cùng (giống ảnh) -->
                <div class="flex justify-center mb-8">
                    <img src="Image/appicon.png" alt="FinFin Mind" class="w-28 h-28 md:w-32 md:h-32 rounded-3xl shadow-2xl ring-8 ring-white/70">
                </div>

                <!-- Login Card -->
                <div class="login-card p-12">
                    <h1 class="text-center text-4xl font-bold tracking-tight text-zinc-800 mb-2 logo-font">
                        Chào mừng trở lại!
                    </h1>
                    <p class="text-center text-zinc-600 mb-8">Tiếp tục hành trình tư duy phản biện cùng con</p>

                    <form id="loginForm" class="space-y-6">
                        <div>
                            <label class="block text-sm font-semibold text-zinc-700 mb-2">
                                Email hoặc số điện thoại
                            </label>
                            <input type="text" id="username" 
                                   class="login-input w-full px-6 py-4 rounded-2xl"
                                   placeholder="example@email.com hoặc 0123456789" required>
                        </div>

                        <div>
                            <label class="block text-sm font-semibold text-zinc-700 mb-2">
                                Mật khẩu
                            </label>
                            <div class="relative">
                                <input type="password" id="password" 
                                       class="login-input w-full px-6 py-4 pr-12 rounded-2xl"
                                       placeholder="••••••••" required>
                                <button type="button" id="togglePassword" 
                                        class="absolute right-5 top-1/2 -translate-y-1/2 text-zinc-400 hover:text-zinc-600">
                                    <i class="fa-solid fa-eye"></i>
                                </button>
                            </div>
                            <div class="text-right mt-1">
                                <a href="#" onclick="alert('Chức năng Quên mật khẩu đang được phát triển')" 
                                   class="text-blue-500 hover:text-blue-600 text-sm font-medium">Quên mật khẩu?</a>
                            </div>
                        </div>

                        <!-- 2 nút cạnh nhau giống ảnh -->
                        <div class="grid grid-cols-2 gap-4 pt-4">
                            <button type="submit" 
                                    class="py-5 bg-blue-500 hover:bg-blue-600 text-white rounded-3xl font-semibold text-lg shadow-lg transition-all">
                                Đăng nhập
                            </button>
                            <button type="button" onclick="alert('Chuyển đến trang đăng ký (demo)'); window.location.href='register.html';"
                                    class="py-5 border-2 border-blue-500 text-blue-500 hover:bg-blue-50 rounded-3xl font-semibold text-lg transition-all">
                                Tạo tài khoản
                            </button>
                        </div>

                        <!-- Checkbox từ web gốc -->
                        <label class="flex items-center gap-2 cursor-pointer text-sm">
                            <input type="checkbox" class="w-4 h-4 accent-blue-500">
                            <span class="text-zinc-600">Ghi nhớ đăng nhập</span>
                        </label>
                    </form>

                    <!-- OR + Google / Apple (bổ sung từ web gốc) -->
                    <div class="my-8 flex items-center gap-4">
                        <div class="flex-1 h-px bg-zinc-200"></div>
                        <span class="text-zinc-400 text-sm font-medium">HOẶC</span>
                        <div class="flex-1 h-px bg-zinc-200"></div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <button onclick="alert('Đăng nhập Google (demo)')" 
                                class="flex items-center justify-center gap-3 py-4 border border-zinc-300 rounded-2xl hover:bg-zinc-50 transition">
                            <i class="fa-brands fa-google text-red-500"></i>
                            <span class="font-medium">Google</span>
                        </button>
                        <button onclick="alert('Đăng nhập Apple (demo)')" 
                                class="flex items-center justify-center gap-3 py-4 border border-zinc-300 rounded-2xl hover:bg-zinc-50 transition">
                            <i class="fa-brands fa-apple"></i>
                            <span class="font-medium">Apple</span>
                        </button>
                    </div>

                    <!-- Link register + policy -->
                    <div class="text-center mt-10 text-sm">
                        <p class="text-zinc-600">
                            Chưa có tài khoản? 
                            <a href="register.html" class="text-blue-500 font-semibold hover:underline">Đăng ký miễn phí</a>
                        </p>
                    </div>
                    <div class="text-center mt-6 text-xs text-zinc-500">
                        <a href="#" class="hover:underline">Chính sách bảo mật &amp; Điều khoản sử dụng</a>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script src="login.js"></script>
</body>
</html>
